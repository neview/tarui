<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React + Typescript</title>
  </head>

  <body>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('tauri-app-theme');
          var html = document.documentElement;
          if (theme === 'light') {
            html.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
    <!-- ====== 科技风粒子启动动画 ====== -->
    <div id="splash" style="position:fixed;inset:0;z-index:99999;background:#000000;transition:opacity 0.6s ease;">
      <canvas id="splash-canvas" style="display:block;width:100%;height:100%;"></canvas>
    </div>
    <script>
    (function(){
      var cv=document.getElementById('splash-canvas'),ctx=cv.getContext('2d');
      var dpr=window.devicePixelRatio||1,W,H,cx,cy;
      function resize(){W=window.innerWidth;H=window.innerHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);cx=W/2;cy=H/2;}
      resize();window.addEventListener('resize',resize);

      var N=3500;
      var startTime=performance.now();
      var PHASE1=1000,PHASE2=2200;
      var removed=false,fadingOut=false;

      function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

      function sampleTextPoints(text,count){
        var offCv=document.createElement('canvas');
        var fontSize=Math.min(W*0.22,H*0.55);
        offCv.width=W;offCv.height=H;
        var offCtx=offCv.getContext('2d');
        offCtx.fillStyle='#fff';
        offCtx.font='900 '+fontSize+'px "Segoe UI",Arial,Helvetica,sans-serif';
        offCtx.textAlign='center';offCtx.textBaseline='middle';
        offCtx.fillText(text,W/2,H/2);
        var imgData=offCtx.getImageData(0,0,W,H).data;
        var pts=[];
        for(var y=0;y<H;y++){
          for(var x=0;x<W;x++){
            if(imgData[(y*W+x)*4+3]>128) pts.push({x:x,y:y});
          }
        }
        if(pts.length===0) return [];
        for(var i=pts.length-1;i>0;i--){
          var j=Math.floor(Math.random()*(i+1));
          var tmp=pts[i];pts[i]=pts[j];pts[j]=tmp;
        }
        var result=[];
        var stride=Math.max(1,Math.floor(pts.length/count));
        for(var i=0;i<count;i++) result.push(pts[(i*stride)%pts.length]);
        return result;
      }

      var textTargets=sampleTextPoints('MGJT',N);

      var ps=[];
      for(var i=0;i<N;i++){
        var tx=textTargets[i]?textTargets[i].x:cx+(Math.random()-0.5)*200;
        var ty=textTargets[i]?textTargets[i].y:cy+(Math.random()-0.5)*100;
        var dist=Math.sqrt((tx-cx)*(tx-cx)+(ty-cy)*(ty-cy));
        ps.push({
          ox:Math.random()*W,oy:Math.random()*H,
          x:0,y:0,px:0,py:0,
          tx:tx,ty:ty,
          delay:0.15+Math.random()*0.35,
          r:0.3+Math.random()*0.6,
          a:0.5+Math.random()*0.5,
          vx:(Math.random()-0.5)*0.6,
          vy:(Math.random()-0.5)*0.6,
          fp:Math.random()*6.28,
          fax:0.15+Math.random()*0.5,
          fay:0.15+Math.random()*0.5,
          fs:0.005+Math.random()*0.01
        });
      }

      var LINK_COUNT=800;
      var linkPairs=[];
      for(var k=0;k<LINK_COUNT;k++){
        linkPairs.push([Math.floor(Math.random()*N),Math.floor(Math.random()*N)]);
      }

      var autoHide=false;
      function animate(){
        if(removed)return;
        var now=performance.now(),el=now-startTime;
        ctx.clearRect(0,0,W,H);

        var phase=1,t=0;
        if(el>PHASE1+PHASE2){phase=3;}
        else if(el>PHASE1){phase=2;t=Math.min(1,(el-PHASE1)/PHASE2);}

        var fadeIn=Math.min(1,el/500);

        for(var i=0;i<N;i++){
          var p=ps[i];
          p.px=p.x;p.py=p.y;

          if(phase===1){
            p.ox+=p.vx;p.oy+=p.vy;
            if(p.ox<-5)p.ox=W+5;if(p.ox>W+5)p.ox=-5;
            if(p.oy<-5)p.oy=H+5;if(p.oy>H+5)p.oy=-5;
            p.x=p.ox;p.y=p.oy;
          }else if(phase===2){
            var pt=Math.max(0,Math.min(1,(t-p.delay)/(1-p.delay)));
            var et=ease(pt);
            p.x=p.ox+(p.tx-p.ox)*et;
            p.y=p.oy+(p.ty-p.oy)*et;
          }else{
            p.fp+=p.fs;
            p.x=p.tx+Math.sin(p.fp)*p.fax;
            p.y=p.ty+Math.cos(p.fp*0.7)*p.fay;
          }

          var sz=p.r;
          var al=p.a*fadeIn;

          if(phase===2){
            var speed=Math.sqrt((p.x-p.px)*(p.x-p.px)+(p.y-p.py)*(p.y-p.py));
            var trailLen=Math.min(speed*0.8,12);
            if(trailLen>1){
              var dx=p.px-p.x,dy=p.py-p.y;
              var d=Math.sqrt(dx*dx+dy*dy)||1;
              dx/=d;dy/=d;
              ctx.beginPath();
              ctx.moveTo(p.x,p.y);
              ctx.lineTo(p.x+dx*trailLen,p.y+dy*trailLen);
              ctx.strokeStyle='rgba(255,255,255,'+(al*0.3)+')';
              ctx.lineWidth=sz*0.5;
              ctx.stroke();
            }
          }

          ctx.beginPath();
          ctx.arc(p.x,p.y,sz,0,6.28);
          ctx.fillStyle='#fff';
          ctx.globalAlpha=al;
          ctx.fill();
          ctx.globalAlpha=1;
        }

        ctx.globalAlpha=1;
        ctx.lineWidth=0.3;
        for(var k=0;k<LINK_COUNT;k++){
          var a=ps[linkPairs[k][0]],b=ps[linkPairs[k][1]];
          var dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy;
          var maxD=phase===1?6000:(phase===2?4000*(0.2+0.8*(1-t)):800);
          if(d2<maxD){
            var la=(1-d2/maxD)*0.12*fadeIn;
            if(phase===2) la*=t;
            if(la>0.01){
              ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
              ctx.strokeStyle='rgba(255,255,255,'+la+')';
              ctx.stroke();
            }
          }
        }

        if(phase===3||phase===2&&t>0.5){
          var ga=phase===3?0.08:0.08*(t-0.5)/0.5;
          var rg=Math.min(W,H)*0.5;
          var grad=ctx.createRadialGradient(cx,cy,rg*0.1,cx,cy,rg*1.5);
          grad.addColorStop(0,'rgba(255,255,255,'+ga+')');
          grad.addColorStop(0.5,'rgba(200,200,200,'+(ga*0.3)+')');
          grad.addColorStop(1,'rgba(255,255,255,0)');
          ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
        }

        if(phase===3&&!autoHide){
          autoHide=true;
          setTimeout(function(){if(window.removeSplash)window.removeSplash();},800);
        }

        requestAnimationFrame(animate);
      }
      animate();

      window.removeSplash=function(){
        if(fadingOut)return;fadingOut=true;
        var el=document.getElementById('splash');
        if(!el){removed=true;return;}
        el.style.opacity='0';
        setTimeout(function(){el.remove();removed=true;},700);
      };
    })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
